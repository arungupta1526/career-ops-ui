name: CI

# Runs the full unit + integration suite on every push and pull request.
# A separate `e2e` job spins up Playwright for the browser walkthrough so
# that the cheap unit suite still gives quick feedback on most PRs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit + integration (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Run unit + integration tests
        run: npm test
      - name: Verify i18n coverage (every key × 8 locales)
        run: node -e "const {readFileSync}=require('node:fs');const {createContext,runInContext}=require('node:vm');let s=readFileSync('public/js/lib/i18n.js','utf8');s=s.replace(/return\s*\{\s*t,\s*setLang,\s*getLang,\s*getLangs,\s*onChange\s*\};/,'return { t,setLang,getLang,getLangs,onChange,_DICT:DICT };');const ctx=createContext({window:{},localStorage:{getItem:()=>null,setItem:()=>{}},document:{documentElement:{lang:'en'},addEventListener:()=>{}},navigator:{language:'en'}});runInContext(s,ctx);const D=ctx.window.I18n._DICT;const langs=['en','es','pt-BR','ko','ja','ru','zh-CN','zh-TW'];let miss=0;for(const k of Object.keys(D))for(const l of langs)if(!D[k][l]){console.error('miss',k,l);miss++}console.log('keys',Object.keys(D).length,'×',langs.length,'=',Object.keys(D).length*langs.length,'· missing',miss);process.exit(miss?1:0)"
      - name: i18n hygiene audit (I18N-CL4 — personal-data / parity / empty / bare-date)
        run: npm run audit:i18n

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --no-audit --no-fund
      # The e2e suite imports `playwright` from a local node_modules. We
      # install it into web-ui's own tree for CI even though production
      # users get it via the parent project (FIX-C12).
      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Run smoke e2e
        run: node tests/e2e.mjs
      - name: Run comprehensive e2e
        run: node tests/e2e-comprehensive.mjs
      # P-9 — browser-driven smoke harness (node --test tests/playwright-smoke.mjs).
      # Resolves Playwright via CAREER_OPS_ROOT/node_modules in production;
      # CI uses the local `npm install --no-save playwright` above.
      - name: Run Playwright browser smoke
        run: npm run test:e2e:browser
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: screenshots/
          if-no-files-found: ignore
